apiVersion: apps/v1
kind: Deployment
metadata:
  name: fitness-dp
  namespace: pavitra-ns
  labels:
    app: fitness
spec:
  replicas: 8
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 25%
      maxSurge: 25%
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
    spec: 
      containers:
        - name: fitness-container
          image: muralisocial123/fitness-app:v1.0.1
          ports:
            - containerPort: 5000
---
apiVersion: v1
kind: Service
metadata:
  name: fitness-dp-svc
  namespace: pavitra-ns
spec:
  selector:
    app: web
  ports:
    - port: 3001 #it's a service port number, we are using to expose to the internet
      targetPort: 5000
      protocol: TCP
  type: ClusterIP